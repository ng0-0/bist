<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIST Analyzer</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    padding: 15px;
    margin: 0;
}

.container {
    max-width: 500px;
    margin: auto;
}

.input-row {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2563eb;
    color: white;
}

/* TOP BUTTONS */
.top-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.top-buttons button {
    flex: 1;
    background: #1e40af;
}

/* suggestions */
#suggestions {
    background: #1e293b;
    border-radius: 10px;
    margin-top: 5px;
    max-height: 200px;
    overflow-y: auto;
}

.suggestion-item {
    padding: 10px;
    border-bottom: 1px solid #334155;
    cursor: pointer;
}

.suggestion-item:hover {
    background: #334155;
}

/* card */
.card {
    margin-top: 20px;
    padding: 15px;
    background: #1e293b;
    border-radius: 10px;
}

.big {
    font-size: 22px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.orange { color: #f59e0b; }

/* bar */
.bar-container {
    width: 100%;
    height: 10px;
    background: #334155;
    border-radius: 10px;
    margin-top: 5px;
}

.bar {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(to right, #ef4444, #f59e0b, #22c55e);
}

/* list */
.list-item {
    background: #1e293b;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
}

.score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
}

.signal {
    font-size: 16px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 10px;
    background: #334155;
}
.green-bg { background: rgba(34,197,94,0.2); }
.orange-bg { background: rgba(245,158,11,0.2); }
.red-bg { background: rgba(239,68,68,0.2); }
.hisse-link {
    color: #60a5fa;
    cursor: pointer;
    font-weight: bold;
}

.hisse-link:hover {
    text-decoration: underline;
}

/* tooltip */
#tooltip {
    position: fixed;
    background: #020617;
    color: white;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 9999;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    pointer-events: none;
    display: none;
    min-width: 160px;
}
</style>
</head>
<div id="tooltip"></div>
<body>

<div class="container">

<h2>📊 BIST Analyzer</h2>

<div class="top-buttons">
    <button onclick="showTop(10)">Top 10</button>
    <button onclick="showTop(50)">Top 50</button>
    <button onclick="showTop(100)">Top 100</button>
    <button onclick="showByAnalyst()">👨‍💼 Analist Sıralaması</button>
</div>

<div class="input-row">
    <input id="symbol" placeholder="Hisse gir">
    <button onclick="search()">Analiz Et</button>
</div>

<div id="suggestions"></div>
<div id="result"></div>
<div id="toplist"></div>

</div>

<script>

let data = [];

fetch("https://dl.dropboxusercontent.com/scl/fi/eiyktxtdnm3jp32hvqnev/data.json?rlkey=my50wvz5dkox9ss3v7j9cvn7e")
.then(res => {
    console.log("STATUS:", res.status);
    return res.text();  // 🔥 JSON değil text al
})
.then(text => {
    console.log("RAW:", text.slice(0, 100));  // ilk 100 char

    try {
        const json = JSON.parse(text);
        console.log("DATA LENGTH:", json.length);
        data = json;
        showTop(10);
    } catch (e) {
        console.error("NOT JSON:", e);
    }
})
.catch(err => {
    console.error("FETCH ERROR:", err);
});
/* helpers */
function normalize(score) {
    return Math.max(0, Math.min(100, score * 100));
}

function getColor(karar) {
    if (karar === "GÜÇLÜ AL" || karar === "AL") return "green";
    if (karar === "TUT" || karar === "NÖTR") return "orange";
    return "red";
}

function getSignal(karar) {
    switch(karar) {
        case "GÜÇLÜ AL": return "🔥 GÜÇLÜ AL";
        case "AL": return "🟢 AL";
        case "TUT": return "🟡 TUT";
        case "NÖTR": return "⚪ NÖTR";
        case "ZAYIF": return "🟠 ZAYIF";
        case "SAT": return "🔴 SAT";
        default: return "❓";
    }
}

function getMomentumLabel(m) {
    if (m > 10) return "🔥 Güçlü AL";
    if (m > 0) return "🟡 Orta";
    return "🔴 Zayıf";
}

/* autocomplete */
document.getElementById("symbol").addEventListener("input", function() {

    let value = this.value.toUpperCase().trim();
    let box = document.getElementById("suggestions");

    if (!value) {
        box.innerHTML = "";
        return;
    }

    let filtered = data
        .filter(x => x.Kod && x.Kod.toUpperCase().startsWith(value))
        .sort((a,b)=> (b.Score||0)-(a.Score||0))
        .slice(0,50);

    box.innerHTML = "";

    filtered.forEach(item => {

        let emoji = "🔴";
        if (item.Score > 0.75) emoji = "🔥";
        else if (item.Score > 0.65) emoji = "🟢";
        else if (item.Score > 0.45) emoji = "🟡";

        let div = document.createElement("div");
        div.className = "suggestion-item";
        div.innerText = `${emoji} ${item.Kod} (${item.Score?.toFixed(2)})`;

        div.onclick = () => {
            document.getElementById("symbol").value = item.Kod;
            box.innerHTML = "";
            search();
        };

        box.appendChild(div);
    });
});

/* search */
function search() {

    let s = document.getElementById("symbol").value.toUpperCase().trim();
    let stock = data.find(x => x.Kod === s);

    if (!stock) {
        document.getElementById("result").innerHTML = "❌ Hisse bulunamadı";
        return;
    }

    // ------------------ CORE ------------------
    let score = stock.Score || 0;
    let scoreClamped = Math.min(score, 1);
    let scorePct = scoreClamped * 100;

    let karar = stock.karar || "NÖTR";
    let percent = scorePct;
    let color = getColor(karar);

    let cap = stock.SmallCap ? "⚠️ Düşük Sermaye<br>" : "";

    // ------------------ SCORE LABEL ------------------
    let scoreLabel =
        scoreClamped > 0.80 ? "elite" :
        scoreClamped > 0.70 ? "güçlü" :
        scoreClamped > 0.60 ? "iyi" :
        scoreClamped > 0.45 ? "orta" :
        "zayıf";

    // ------------------ KAR ISTIKRARI ------------------
    let istikrar = 1 - (stock.volatilite || 0);

    let istikrarLabel =
        istikrar > 0.7 ? "yüksek" :
        istikrar > 0.4 ? "orta" :
        "düşük";
    let growth = stock.ceyreklik_buyume || 0;
    
    let growthLabel =
        growth > 0.3 ? "çok güçlü" :
        growth > 0.15 ? "güçlü" :
        growth > 0.05 ? "orta" :
        growth > 0 ? "zayıf" :
        "negatif";
    // ------------------ KARLILIK ------------------
    let margin = stock.Net_Margin || 0;
    margin = Math.max(-1, Math.min(1, margin));

    let marginLabel =
        margin > 0.20 ? "çok yüksek" :
        margin > 0.10 ? "yüksek" :
        margin > 0.05 ? "iyi" :
        margin > 0 ? "zayıf" :
        "negatif";

    // ------------------ SEKTÖREL ------------------
    let marginRel = stock.margin_rel || 1;

    let marginRelLabel =
        marginRel > 1.5 ? "sektöre göre çok iyi" :
        marginRel > 1.1 ? "sektöre göre daha yüksek" :
        marginRel > 0.9 ? "sektör ortalamasında" :
        marginRel > 0.7 ? "sektöre göre düşük" :
        "sektöre göre zayıf";

    // ------------------ RENDER ------------------
    document.getElementById("result").innerHTML = `
        <div class="card">

            <div class="big">#${stock.Super_Rank ?? "-"} ${stock.Kod}</div>

            🏭 Sektör: ${stock.Sektor?.replace(/\n/g, " ") ?? "NA"}<br>

            💰 FK: ${stock.fk?.toFixed(2) ?? "NA"} | 
            PD/DD: ${stock.PD_DD?.toFixed(2) ?? "NA"}<br>

            📊 Kârlılık: ${(margin * 100).toFixed(1)}% (${marginLabel})<br>
            📈 Büyüme: ${(growth * 100).toFixed(1)}% (${growthLabel})<br>
            📊 Sektöre Göre: ${marginRelLabel}<br>

            📅 Bilanço tarihi: ${stock.Bilanco_Tarih || "YOK"}<br>

            📉 Kâr İstikrarı: ${(istikrar * 100).toFixed(0)}% (${istikrarLabel})<br>

            📈 Trend: ${stock.trend ?? 0}/3<br>

            ${cap}

            👨‍💼 Analist: ${stock.AnalistSayisi || 0}<br>
            📦 Model Portföy: ${stock.ModelPortfoy || 0}<br>
            🎯 Hedef Fiyat: ${stock.HedefFiyat ?? "YOK"} (${Number(stock.PotansiyelGetiri || 0).toFixed(2)}%)<br>

            <div style="margin-top:6px; color:#94a3b8;">
                📌 ${stock.yorum ?? ""}
            </div>

            <br>

            <div class="score-row">
                <div class="big ${color}">
                    Score: ${scorePct.toFixed(0)} (${scoreLabel})
                </div>
                <div class="signal ${color}-bg">
                    ${getSignal(karar)}
                </div>
            </div>

            <div class="bar-container">
                <div class="bar" style="width:${percent}%"></div>
            </div>

            <br>

            <button onclick="toggleDetail('${stock.Kod}')">Çeyreklik Kârlar</button>

            <div id="d-${stock.Kod}" style="display:none; margin-top:10px;">
                Q1: ${stock.NetKar_Q1?.toFixed(2) ?? "-"} MTL<br>
                Q2: ${stock.NetKar_Q2?.toFixed(2) ?? "-"} MTL<br>
                Q3: ${stock.NetKar_Q3?.toFixed(2) ?? "-"} MTL<br>
                Q4: ${stock.NetKar_Q4?.toFixed(2) ?? "-"} MTL
            </div>

            <br>

        </div>
    `;
}
/* top list */
function showTop(n) {

    let sorted = [...data]
        .sort((a,b)=> {
            let ra = a.Super_Rank ?? 9999;
            let rb = b.Super_Rank ?? 9999;
            return ra - rb;
        })
        .slice(0,n);

    let html = "<h3>📊 En Güçlü Hisseler</h3>";

    sorted.forEach(s => {

        // ------------------ SCORE ------------------
        let score = s.Score || 0;
        let scoreClamped = Math.min(score, 1);
        let scorePct = scoreClamped * 100;
        let percent = scorePct;

        let scoreLabel =
            scoreClamped > 0.80 ? "elite" :
            scoreClamped > 0.70 ? "güçlü" :
            scoreClamped > 0.60 ? "iyi" :
            scoreClamped > 0.45 ? "orta" :
            "zayıf";

        let cap = s.SmallCap ? "⚠️" : "";

        // ------------------ ISTIKRAR ------------------
        let istikrar = 1 - (s.volatilite || 0);

        let istikrarLabel =
            istikrar > 0.7 ? "yüksek" :
            istikrar > 0.4 ? "orta" :
            "düşük";

        // ------------------ KARLILIK ------------------
        let margin = s.Net_Margin || 0;
        margin = Math.max(-1, Math.min(1, margin));

        let marginLabel =
            margin > 0.20 ? "çok yüksek" :
            margin > 0.10 ? "yüksek" :
            margin > 0.05 ? "iyi" :
            margin > 0 ? "zayıf" :
            "negatif";

        // ------------------ SEKTÖREL ------------------
        let marginRel = s.margin_rel || 1;

        let marginRelLabel =
            marginRel > 1.5 ? "sektöre göre çok iyi" :
            marginRel > 1.1 ? "sektöre göre daha yüksek" :
            marginRel > 0.9 ? "sektör ortalamasında" :
            marginRel > 0.7 ? "sektöre göre düşük" :
            "sektöre göre zayıf";

        html += `
            <div class="list-item">

                <b>
                #${s.Super_Rank ?? "-"} 
                <span class="hisse-link"
                      onclick="secHisse('${s.Kod}')"
                      onmouseenter="showTooltip(event, '${s.Kod}')"
                      onmouseleave="hideTooltip()">
                    ${s.Kod}
                </span>
                ${cap}
                </b><br>

                🏭 ${s.Sektor?.replace(/\n/g, " ") ?? "NA"}<br>

                💰 FK: ${s.fk?.toFixed(2) ?? "NA"} | 
                PD/DD: ${s.PD_DD?.toFixed(2) ?? "NA"}<br>

                📊 Kârlılık: ${(margin * 100).toFixed(1)}% (${marginLabel})<br>
                📊 Sektöre Göre: ${marginRelLabel}<br>
                🧠 Score: ${scorePct.toFixed(0)} (${scoreLabel})<br>
                
                <div style="margin-top:6px; color:#94a3b8;">
                📌 ${s.yorum ?? ""}
                </div>
                
                <div class="bar-container">
                    <div class="bar" style="width:${percent}%"></div>
                </div>

                <button onclick="toggleDetail('${s.Kod}')">Çeyreklik Kârlar</button>

                <div id="d-${s.Kod}" style="display:none; margin-top:6px;">
                    Q1: ${s.NetKar_Q1?.toFixed(2) ?? "-"} MTL<br>
                    Q2: ${s.NetKar_Q2?.toFixed(2) ?? "-"} MTL<br>
                    Q3: ${s.NetKar_Q3?.toFixed(2) ?? "-"} MTL<br>
                    Q4: ${s.NetKar_Q4?.toFixed(2) ?? "-"} MTL
                </div>

            </div>
        `;
    });

    document.getElementById("toplist").innerHTML = html;
}
function toggleDetail(kod) {
    let el = document.getElementById("d-" + kod);
    el.style.display = (el.style.display === "none") ? "block" : "none";
}
function secHisse(kod) {
    document.getElementById("symbol").value = kod;
    search();

    history.pushState(null, "", "?kod=" + kod);

    setTimeout(() => {
        document.getElementById("result").scrollIntoView({
            behavior: "smooth"
        });
    }, 100);
}
function smartScore(x) {
    let a = Number(x.AnalistSayisi) || 0;
    let m = Number(x.ModelPortfoy) || 0;
    let g = Number(x.PotansiyelGetiri) || 0;

    return Math.log1p(a) * Math.log1p(m) * (1 + g / 100);
}

function showByAnalyst() {

    let sorted = [...data]
        .filter(x => x.AnalistSayisi || x.ModelPortfoy || x.PotansiyelGetiri)
        .sort((a, b) => smartScore(b) - smartScore(a))
        .slice(0, 50);

    let html = "<h3>🧠 Smart Para (Analist + Model + Getiri)</h3>";

    sorted.forEach(s => {

        let percent = normalize(Math.min(s.Score || 0, 1));
        let cap = s.SmallCap ? "⚠️" : "";
        let score = s.Score || 0;

        html += `
            <div class="list-item">

                <b>
                #${s.Super_Rank ?? "-"} 
                <span class="hisse-link"
                      onclick="secHisse('${s.Kod}')"
                      onmouseenter="showTooltip(event, '${s.Kod}')"
                      onmouseleave="hideTooltip()">
                    ${s.Kod}
                </span>
                ${cap}
                </b><br>

                👨‍💼 ${s.AnalistSayisi || 0} | 
                📦 ${s.ModelPortfoy || 0} | 
                🎯 ${Number(s.PotansiyelGetiri || 0).toFixed(1)}%<br>

                🧠 Skor: ${score.toFixed(2)}<br>

                <div class="bar-container">
                    <div class="bar" style="width:${percent}%"></div>
                </div>

            </div>
        `;
    });

    document.getElementById("toplist").innerHTML = html;
}
/* tooltip */
function showTooltip(e, kod) {
    const t = document.getElementById("tooltip");
    const h = data.find(x => x.Kod === kod);
    if (!h) return;

    let score = h.Score || 0;
    let karar = h.karar || "NÖTR";
    let renk = score > 0.75 ? "#22c55e" :
                score > 0.60 ? "#4ade80" :
                score > 0.45 ? "#facc15" : "#ef4444";

    t.innerHTML = `
        <b>${kod}</b><br>
        Karar: ${karar}<br>
        FK: ${h.fs?.toFixed(2) ?? "-"}<br>
        PD/DD: ${h.PD_DD?.toFixed(2) ?? "-"}<br>
        Karlılık: ${(h.Net_Margin*100)?.toFixed(1) ?? "-"}%<br>
        Skor: ${score.toFixed(2)}
    
        <div style="margin-top:6px;height:6px;background:#334155;border-radius:4px;">
            <div style="width:${normalize(score)}%;background:${renk};height:100%;border-radius:4px;"></div>
        </div>
    `;

    t.style.display = "block";
    t.style.left = (e.clientX + 10) + "px";
    t.style.top = (e.clientY + 10) + "px";
}

function hideTooltip() {
    document.getElementById("tooltip").style.display = "none";
}

/* mouse takip */
document.addEventListener("mousemove", (e) => {
    const t = document.getElementById("tooltip");
    if (t.style.display === "block") {
        t.style.left = (e.clientX + 10) + "px";
        t.style.top = (e.clientY + 10) + "px";
    }
});

/* URL'den aç */
window.addEventListener("load", () => {
    const params = new URLSearchParams(window.location.search);
    const kod = params.get("kod");

    if (kod) {
        document.getElementById("symbol").value = kod;
        setTimeout(() => search(), 300);
    }
});
</script>

</body>
</html>
